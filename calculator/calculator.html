<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="calculator.css">
    <link rel="stylesheet" href="calculator_m.css">
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <header>
        <div id="name_web">CALC<span id="name_web_2">ULATOR</span></div>

        <div id="menu">
            <a class="link_menu" id="first" href="../index.html">Головна</a>
            <a class="link_menu" id="first_cl">Калькулятор</a>
            <a class="link_menu" href="../about_me/about_me.html">Про мене</a>
            <a class="link_menu" id="last" href="../message/message.html">Повідомлення</a>
        </div>
    </header>

    <section>
            <div class="calculator">
                <div class="calc-display" id="display">0</div>

                <div class="calc-buttons">
                    <button class="btn clear">C</button>
                    <button class="btn operator">÷</button>
                    <button class="btn operator">×</button>
                    <button class="btn operator">−</button>

                    <button class="btn">7</button>
                    <button class="btn">8</button>
                    <button class="btn">9</button>
                    <button class="btn operator">+</button>

                    <button class="btn">4</button>
                    <button class="btn">5</button>
                    <button class="btn">6</button>
                    <button class="btn equal">=</button>

                    <button class="btn">1</button>
                    <button class="btn">2</button>
                    <button class="btn">3</button>
                    <button class="btn operator">%</button>
                    

                    <button class="btn zero">0</button>
                    <button class="btn">.</button>
                    <button class="btn sign">±</button>
                </div>
            </div>
    </section>
